<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mesa IA</title>
    </head>
<body>
    <script>
        // Mantenha suas funções originais aqui

        // Bloco de segurança para a colagem de imagens
        document.getElementById('msgInput').addEventListener('paste', function(e) {
            try {
                const items = e.clipboardData.items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf('image') !== -1) {
                        const file = items[i].getAsFile();
                        if (file) {
                            e.preventDefault();
                            handleFiles([file]);
                        }
                    }
                }
            } catch (err) {
                console.error("Erro ao processar colagem:", err);
            }
        });
    </script>
</body>
</html>
