<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Mesa IA</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root {
  --bg:#0c0c0e;--surface:#13131a;--surface2:#1a1a24;
  --border:#22222e;--border2:#2a2a3a;
  --claude:#a78bfa;--claude-bg:#a78bfa18;
  --gpt:#34d399;--gpt-bg:#34d39918;
  --gemini:#60a5fa;--gemini-bg:#60a5fa18;
  --diabo:#f87171;--diabo-bg:#f8717118;
  --fagner:#fbbf24;
  --text:#e8e8f0;--muted:#4a4a60;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
header{border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface);}
.header-left{display:flex;align-items:center;gap:12px;}
.mesa-logo{font-size:17px;font-weight:800;letter-spacing:-0.3px;}
.agents-pills{display:flex;gap:5px;flex-wrap:wrap;}
.pill{font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace;padding:3px 8px;border-radius:20px;letter-spacing:.5px;}
.pill-claude{background:var(--claude-bg);color:var(--claude);border:1px solid #a78bfa44;}
.pill-gpt{background:var(--gpt-bg);color:var(--gpt);border:1px solid #34d39944;}
.pill-gemini{background:var(--gemini-bg);color:var(--gemini);border:1px solid #60a5fa44;}
.pill-diabo{background:var(--diabo-bg);color:var(--diabo);border:1px solid #f8717144;}
.btn-context{background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 12px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-context:hover{border-color:var(--fagner);color:var(--fagner);}

/* CHAT */
.chat-area{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:18px;scroll-behavior:smooth;}
.chat-area::-webkit-scrollbar{width:4px;}
.chat-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* MESSAGES */
.msg{display:flex;flex-direction:column;gap:6px;max-width:100%;}
.msg-header{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.msg-avatar{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.msg-time{color:var(--muted);font-weight:400;font-size:10px;margin-left:auto;}
.msg-bubble{background:var(--surface);border:1px solid var(--border);border-radius:4px 12px 12px 12px;padding:14px 16px;font-size:14px;line-height:1.75;word-break:break-word;}
.msg-bubble img{max-width:100%;border-radius:8px;margin:8px 0;border:1px solid var(--border2);}

/* Code blocks */
.msg-bubble pre{margin:10px 0;border-radius:8px;overflow:hidden;border:1px solid var(--border2);}
.msg-bubble pre code{font-family:'IBM Plex Mono',monospace;font-size:12px;padding:14px 16px;display:block;overflow-x:auto;background:#0d1117;}
.msg-bubble code:not(pre code){background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:1px 6px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#e6db74;}
.code-block-wrap{margin:10px 0;border-radius:8px;overflow:hidden;border:1px solid var(--border2);}
.code-block-header{background:#161b22;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border2);}
.code-lang{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.btn-copy{background:transparent;border:1px solid var(--border2);border-radius:5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 9px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px;}
.btn-copy:hover{border-color:var(--fagner);color:var(--fagner);}
.btn-copy.copied{border-color:var(--gpt);color:var(--gpt);}

/* Agent colors */
.msg-claude .msg-header{color:var(--claude);}
.msg-claude .msg-avatar{background:var(--claude-bg);}
.msg-claude .msg-bubble{border-color:#a78bfa33;}
.msg-gpt .msg-header{color:var(--gpt);}
.msg-gpt .msg-avatar{background:var(--gpt-bg);}
.msg-gpt .msg-bubble{border-color:#34d39933;}
.msg-gemini .msg-header{color:var(--gemini);}
.msg-gemini .msg-avatar{background:var(--gemini-bg);}
.msg-gemini .msg-bubble{border-color:#60a5fa33;}
.msg-diabo .msg-header{color:var(--diabo);}
.msg-diabo .msg-avatar{background:var(--diabo-bg);}
.msg-diabo .msg-bubble{border-color:#f8717133;}
.msg-fagner{align-items:flex-end;}
.msg-fagner .msg-header{color:var(--fagner);flex-direction:row-reverse;}
.msg-fagner .msg-bubble{background:var(--surface2);border-color:#fbbf2422;border-radius:12px 4px 12px 12px;}

/* TYPING */
.typing-indicator{display:flex;align-items:center;gap:10px;padding:8px 0;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:12px;}
.typing-dots{display:flex;gap:4px;}
.typing-dots span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* EMPTY STATE */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:40px 20px;}
.empty-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:340px;}
.empty-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;text-align:left;}
.empty-card:hover{transform:translateY(-2px);}
.empty-card-name{font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;margin-bottom:4px;}
.empty-card-hint{font-size:11px;color:var(--muted);line-height:1.4;}
.ec-claude .empty-card-name{color:var(--claude);} .ec-claude{border-color:#a78bfa22;}
.ec-gpt .empty-card-name{color:var(--gpt);} .ec-gpt{border-color:#34d39922;}
.ec-gemini .empty-card-name{color:var(--gemini);} .ec-gemini{border-color:#60a5fa22;}
.ec-diabo .empty-card-name{color:var(--diabo);} .ec-diabo{border-color:#f8717122;}
.empty-title{font-size:22px;font-weight:800;letter-spacing:-0.3px;}
.empty-sub{font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace;line-height:1.6;}

/* INPUT AREA */
.input-area{border-top:1px solid var(--border);background:var(--surface);padding:10px 16px;flex-shrink:0;}
.agent-selector{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.agent-btn{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;cursor:pointer;border:1px solid transparent;transition:all .12s;background:var(--surface2);color:var(--muted);}
.agent-btn.active-claude{background:var(--claude-bg);color:var(--claude);border-color:#a78bfa44;}
.agent-btn.active-gpt{background:var(--gpt-bg);color:var(--gpt);border-color:#34d39944;}
.agent-btn.active-gemini{background:var(--gemini-bg);color:var(--gemini);border-color:#60a5fa44;}
.agent-btn.active-diabo{background:var(--diabo-bg);color:var(--diabo);border-color:#f8717144;}

.file-preview{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.file-chip{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:6px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text);}
.file-chip img{width:36px;height:36px;object-fit:cover;border-radius:4px;}
.file-chip-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:0 2px;}

.input-wrap{display:flex;gap:8px;align-items:flex-end;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 10px;}
.btn-attach{background:transparent;border:1px solid var(--border2);border-radius:7px;color:var(--muted);font-size:15px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.btn-attach:hover{border-color:var(--fagner);color:var(--fagner);}
#msgInput{flex:1;background:transparent;border:none;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none;resize:none;max-height:120px;line-height:1.5;}
.send-btn{background:var(--fagner);border:none;border-radius:8px;color:#000;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="mesa-logo">Mesa IA</div>
  </div>
  <button class="btn-context" onclick="openModal()">⚙ Contexto do projeto</button>
</header>

<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">
    <div class="empty-title">Mesa IA</div>
    <div class="empty-grid">
      <div class="empty-card ec-claude" onclick="setAgent('claude')"><div class="empty-card-name">@CLAUDE</div></div>
      <div class="empty-card ec-gpt" onclick="setAgent('gpt')"><div class="empty-card-name">@GPT</div></div>
      <div class="empty-card ec-gemini" onclick="setAgent('gemini')"><div class="empty-card-name">@GEMINI</div></div>
      <div class="empty-card ec-diabo" onclick="setAgent('diabo')"><div class="empty-card-name">@DIABO</div></div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="agent-selector">
    <button class="agent-btn active-claude" id="btn-claude" onclick="setAgent('claude')">@Claude</button>
    <button class="agent-btn" id="btn-gpt" onclick="setAgent('gpt')">@GPT</button>
    <button class="agent-btn" id="btn-gemini" onclick="setAgent('gemini')">@Gemini</button>
    <button class="agent-btn" id="btn-diabo" onclick="setAgent('diabo')">@Diabo</button>
  </div>
  <div class="file-preview" id="filePreview"></div>
  <div class="input-wrap">
    <button class="btn-attach" onclick="document.getElementById('fileInput').click()">📎</button>
    <input type="file" id="fileInput" style="display:none" onchange="handleFiles(this.files)"/>
    <textarea id="msgInput" rows="1" placeholder="Mensagem..."></textarea>
    <button class="send-btn" onclick="sendMessage()">↑</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Contexto</div>
    <textarea class="modal-input" id="projetoInput" style="width:100%; height:120px; background:#1a1a24; border:1px solid #2a2a3a; color:#fff; border-radius:8px; padding:10px;"></textarea>
    <div class="modal-actions" style="margin-top:10px;">
      <button onclick="saveProjeto()">Salvar</button>
      <button onclick="closeModal()">Fechar</button>
    </div>
  </div>
</div>

<script>
const AGENTS = {claude:{name:'Claude',emoji:'🟣',label:'CLAUDE'},gpt:{name:'ChatGPT',emoji:'🟢',label:'GPT'},gemini:{name:'Gemini',emoji:'🔵',label:'GEMINI'},diabo:{name:'Diabo',emoji:'🔴',label:'DIABO'}};
let currentAgent = 'claude', pendingFiles = [];

function setAgent(a) {
  currentAgent = a;
  document.querySelectorAll('.agent-btn').forEach(b => b.className='agent-btn');
  document.getElementById(`btn-${a}`).classList.add(`active-${a}`);
}

function handleFiles(files) {
  Array.from(files).forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      pendingFiles.push({name:f.name, base64:e.target.result.split(',')[1], previewUrl: f.type.startsWith('image/') ? e.target.result : null});
      renderPreviews();
    };
    reader.readAsDataURL(f);
  });
}

function renderPreviews() {
  document.getElementById('filePreview').innerHTML = pendingFiles.map((f,i) => `<div class="file-chip">${f.previewUrl ? `<img src="${f.previewUrl}"/>` : ''} ${f.name} <button class="file-chip-remove" onclick="pendingFiles.splice(${i},1);renderPreviews()">×</button></div>`).join('');
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const texto = input.value.trim();
  if(!texto && !pendingFiles.length) return;
  
  const file = pendingFiles[0] || null;
  addUserBubble(texto, file?.previewUrl);
  
  input.value = '';
  pendingFiles = [];
  renderPreviews();
  document.getElementById('emptyState').style.display = 'none';

  const res = await fetch('/api/mensagem', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({texto: `@${currentAgent} ${texto}`, file})});
  const data = await res.json();
  addAgentBubble(data.agente, data.resposta);
}

document.getElementById('msgInput').addEventListener('paste', e => {
  const items = e.clipboardData.items;
  for(let i=0; i<items.length; i++) {
    if(items[i].type.indexOf('image') !== -1) {
      e.preventDefault();
      handleFiles([items[i].getAsFile()]);
    }
  }
});

function addUserBubble(t, img) {
  document.getElementById('chatArea').insertAdjacentHTML('beforeend', `<div class="msg msg-fagner"><div class="msg-bubble">${img ? `<img src="${img}"/>` : ''}${t}</div></div>`);
  document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
}

function addAgentBubble(ag, t) {
  document.getElementById('chatArea').insertAdjacentHTML('beforeend', `<div class="msg msg-${ag}"><div class="msg-header">${ag}</div><div class="msg-bubble">${t}</div></div>`);
  document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
}

function openModal() { document.getElementById('modalOverlay').style.display = 'flex'; }
function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
async function saveProjeto() {
  await fetch('/api/projeto', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({projeto: document.getElementById('projetoInput').value})});
  closeModal();
}
</script>
</body>
</html>
