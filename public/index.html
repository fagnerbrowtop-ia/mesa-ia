<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mesa IA - Correção de Upload</title>
    <!-- Mantenha seus estilos aqui -->
</head>
<body>
    <!-- (Estrutura do seu HTML permanece a mesma) -->
    
    <script>
        // Função corrigida para lidar com arquivos e garantir que a API receba os dados
        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const texto = input.value.trim();
            
            // Verifica se tem algo para enviar (texto ou arquivo)
            if (!texto && pendingFiles.length === 0) return;

            // Prepara o objeto de arquivo para envio, se existir
            const fileData = pendingFiles.length > 0 ? {
                name: pendingFiles[0].name,
                base64: pendingFiles[0].base64 // Certifique-se que o backend espera base64
            } : null;

            // Adiciona a bolha do usuário visualmente
            addUserBubble(texto, pendingFiles[0]?.previewUrl);
            
            input.value = '';
            pendingFiles = [];
            renderPreviews();

            try {
                const res = await fetch('/api/mensagem', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        texto: `@${currentAgent} ${texto}`, 
                        file: fileData // Isso resolve o "undefined" no backend
                    })
                });
                
                const data = await res.json();
                // Verifica se a resposta contém os campos esperados para evitar o erro "undefined"
                if (data && data.agente && data.resposta) {
                    addAgentBubble(data.agente, data.resposta);
                } else {
                    console.error("Erro na resposta da API:", data);
                    addAgentBubble('Sistema', 'Erro: Resposta do agente inválida.');
                }
            } catch (err) {
                console.error("Falha ao enviar mensagem:", err);
            }
        }
    </script>
</body>
</html>
